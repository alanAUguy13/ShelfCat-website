import React, { useState, useEffect } from 'react';

const LynxDemo = () => {
  const [logs, setLogs] = useState([
    "00:00:00 [SYS] Edge node initializing...",
    "00:00:01 [INF] Loading vision models...",
    "00:00:02 [INF] Camera stream connected"
  ]);

  useEffect(() => {
    let count = 3;
    const interval = setInterval(() => {
      const ms = String(count).padStart(2, '0');
      const events = [
        `00:00:${ms} [DET] Confidence 98.4% - Item ID: A492`,
        `00:00:${ms} [NET] Payload compressed: 4.2kb`,
        `00:00:${ms} [DET] Target acquired. Range: 4.2m`,
        `00:00:${ms} [INF] Memory utilization: 42%`
      ];
      setLogs(prev => {
        const next = [...prev, events[count % events.length]];
        return next.slice(-6); // Keep last 6 logs
      });
      count++;
    }, 1500);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="h-64 rounded-xl bg-zinc-950 p-4 font-mono text-xs border border-emerald-500/20 shadow-inner overflow-hidden flex flex-col justify-end">
      {logs.map((log, i) => (
        <div key={i} className="text-emerald-400/80 mb-1 leading-relaxed">
          <span className="text-zinc-500 mr-2">{'>'}</span>{log}
        </div>
      ))}
      <div className="text-emerald-400 mt-1 flex items-center">
        <span className="text-zinc-500 mr-2">{'>'}</span>
        <span className="w-2 h-3 bg-emerald-400 animate-pulse"></span>
      </div>
    </div>
  );
};

