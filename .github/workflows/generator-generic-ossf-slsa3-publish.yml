const BusinessDemo = () => {
  const [slots, setSlots] = useState([
    { id: 1, status: 'ok' }, { id: 2, status: 'ok' }, { id: 3, status: 'violation' },
    { id: 4, status: 'ok' }, { id: 5, status: 'checking' }, { id: 6, status: 'ok' }
  ]);

  useEffect(() => {
    const interval = setInterval(() => {
      setSlots(prev => {
        const next = [...prev];
        const checkingIdx = next.findIndex(s => s.status === 'checking');
        if (checkingIdx !== -1) {
          next[checkingIdx].status = Math.random() > 0.6 ? 'violation' : 'ok';
          const nextCheck = (checkingIdx + 1) % next.length;
          next[nextCheck].status = 'checking';
        }
        return next;
      });
    }, 2000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="h-64 rounded-xl bg-zinc-900 border border-fuchsia-500/20 p-4 flex flex-col">
      <div className="text-xs font-semibold text-zinc-300 mb-4 flex justify-between">
        <span>Aisle 14 Compliance</span>
        <span className="text-fuchsia-400 flex items-center gap-1">
          <span className="w-1.5 h-1.5 bg-fuchsia-500 rounded-full animate-ping"></span> Live
        </span>
      </div>
      <div className="grid grid-cols-3 gap-2 flex-1">
        {slots.map(slot => (
          <div 
            key={slot.id} 
            className={`rounded-lg border flex items-center justify-center text-[10px] uppercase tracking-wider transition-colors duration-500
              ${slot.status === 'ok' ? 'bg-zinc-950/50 border-zinc-800 text-zinc-500' : ''}
              ${slot.status === 'checking' ? 'bg-fuchsia-500/10 border-fuchsia-500/50 text-fuchsia-300 animate-pulse' : ''}
              ${slot.status === 'violation' ? 'bg-red-500/10 border-red-500/50 text-red-400' : ''}
            `}
          >
            {slot.status}
          </div>
        ))}
      </div>
    </div>
  );
};

const IcedCatSecurityGate = () => {
  const [mode, setMode] = useState('info'); // 'info' | 'copilot'
  const [input, setInput] = useState('Flag any item with CO2e > 0.5kg and quarantine it from the primary slot map.');
  const [output, setOutput] = useState('');
  const [isGenerating, setIsGenerating] = useState(false);
  const [error, setError] = useState('');

  const handleGenerate = async () => {
    if (!input.trim()) return;
    setIsGenerating(true);
    setError('');
    setOutput('');

    const apiKey = ""; // API Key provided by environment at runtime
    if (!apiKey) {
      setError("System offline: API Key missing.");
      setIsGenerating(false);
      return;
    }

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    const payload = {
      contents: [{ parts: [{ text: input }] }],
      systemInstruction: {
        parts: [{ text: "You are Iced Cat, the ShelfCat Edge AI. Convert the user's natural language retail rule into a short JSON policy payload, and a brief Rust enforcement function. Output ONLY the raw code/json. Do not use markdown backticks." }]
      }
    };

    const delays = [1000, 2000, 4000, 8000, 16000];
    let attempt = 0;
    let success = false;

    while (attempt < delays.length && !success) {
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`HTTP error ${response.status}`);

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (text) {
           // Clean up any rogue markdown backticks that the LLM might still generate
           setOutput(text.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim());
           success = true;
        } else {
           throw new Error("Empty response");
        }
      } catch (err) {
        if (attempt < delays.length - 1) {
          await new Promise(res => setTimeout(res, delays[attempt]));
          attempt++;
        } else {
          setError("Failed to generate policy after multiple attempts. Neural link severed.");
          break;
        }
      }
    }
    setIsGenerating(false);
  };

  return (
    <div className="mt-5 rounded-[2rem] border border-green-500/30 bg-zinc-950/90 p-6 relative overflow-hidden flex flex-col shadow-[0_0_30px_rgba(34,197,94,0.1)] transition-all duration-500">
      <div className="absolute inset-0 bg-[radial-gradient(circle_at_left,_rgba(34,197,94,.08),_transparent_50%)] pointer-events-none" />
      
      {/* Header Profile */}
      <div className="relative z-10 flex flex-col sm:flex-row items-start sm:items-center gap-6 mb-4">
        <div className="shrink-0 w-20 h-20 rounded-full bg-zinc-900 border-2 border-green-500/50 flex flex-col items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.2)]">
          <div className="w-5 h-5 border-[2px] border-green-500/70 rounded-sm mb-1.5 animate-[spin_6s_linear_infinite]" />
          <span className="text-[7px] font-bold text-green-400 tracking-widest">ICED CAT</span>
        </div>
        <div className="flex-1">
          <div className="text-xs font-bold uppercase tracking-[0.2em] text-green-400 mb-1 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" />
            ShelfCat Security Gate
          </div>
          <div className="text-lg font-semibold text-white mb-1">Secure Industrial Telemetry Hub</div>
          <p className="text-xs leading-relaxed text-zinc-400 max-w-xl">
            Unauthorized access is restricted under Power.CO protocol. Need to draft new enforcement logic? 
          </p>
        </div>
        <button 
          onClick={() => setMode(mode === 'info' ? 'copilot' : 'info')}
          className={`shrink-0 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all ${
            mode === 'copilot' 
            ? 'bg-zinc-800 text-zinc-400 border border-zinc-700' 
            : 'bg-green-500/10 text-green-400 border border-green-500/50 hover:bg-green-500/20 hover:shadow-[0_0_15px_rgba(34,197,94,0.3)]'
          }`}
        >
          {mode === 'info' ? 'Engage AI Copilot' : 'Close Terminal'}
        </button>
      </div>

      {/* Copilot Interface */}
      {mode === 'copilot' && (
        <div className="relative z-10 mt-4 border-t border-green-500/20 pt-6 animate-in fade-in slide-in-from-top-4 duration-500">
          <div className="text-sm font-semibold text-white mb-2">Translate natural language into deterministic Rust policies:</div>
          <div className="flex flex-col gap-3">
            <textarea 
              value={input}
              onChange={(e) => setInput(e.target.value)}
              className="w-full bg-zinc-900/80 border border-zinc-700 rounded-xl p-4 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-green-500/50 transition-colors resize-none h-24 font-mono"
              placeholder="E.g., Flag any item with CO2e > 0.5kg and quarantine it from the primary slot map."
            />
            <button 
              onClick={handleGenerate}
              disabled={isGenerating}
              className="self-end px-6 py-2.5 rounded-xl bg-green-500 text-zinc-950 font-bold text-sm shadow-[0_0_15px_rgba(34,197,94,0.3)] hover:bg-green-400 transition-colors disabled:opacity-50 flex items-center gap-2"
            >
              {isGenerating ? (
                <><span className="w-4 h-4 border-2 border-zinc-950 border-t-transparent rounded-full animate-spin"></span> Compiling...</>
              ) : (
                'Synthesize Rule'
              )}
            </button>
          </div>

          {(output || error) && (
            <div className="mt-4 p-4 rounded-xl bg-zinc-950 border border-green-500/30 overflow-x-auto relative shadow-inner">
              <div className="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-green-500/50 to-transparent"></div>
              {error ? (
                <div className="text-red-400 text-sm font-mono">{error}</div>
              ) : (
                <pre className="text-green-400 text-[11px] sm:text-xs font-mono leading-relaxed">
                  {output}
                </pre>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

